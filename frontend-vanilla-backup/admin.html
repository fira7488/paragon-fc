<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paragon FC - Admin Login</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .login-container {
        background: rgba(20, 20, 30, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        padding: 40px;
        width: 400px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      }
      .logo {
        text-align: center;
        font-size: 28px;
        font-weight: bold;
        margin-bottom: 30px;
      }
      .logo span {
        color: #c9a227;
      }
      .input-group {
        margin-bottom: 20px;
      }
      label {
        display: block;
        margin-bottom: 8px;
        color: rgba(255, 255, 255, 0.7);
        font-size: 14px;
      }
      input {
        width: 100%;
        padding: 12px 16px;
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        color: white;
        font-size: 16px;
      }
      input:focus {
        outline: none;
        border-color: #c9a227;
      }
      button {
        width: 100%;
        padding: 12px;
        background: #c9a227;
        color: #000;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 20px;
        transition: all 0.3s;
      }
      button:hover {
        background: #d4b33a;
        transform: translateY(-2px);
      }
      .error-msg {
        color: #ff4444;
        font-size: 14px;
        margin-top: 15px;
        text-align: center;
      }
      .status {
        text-align: center;
        font-size: 12px;
        margin-top: 20px;
        color: rgba(255, 255, 255, 0.5);
      }
      .status.online {
        color: #00ff00;
      }
      .status.offline {
        color: #ff4444;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="logo">PARAGON<span>FC</span></div>
      <div class="input-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter username" />
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password" />
      </div>
      <button onclick="login()">Login</button>
      <div id="errorMsg" class="error-msg"></div>
      <div id="statusMsg" class="status">Checking server connection...</div>
    </div>

    <script>
      const API_URL = "http://localhost:5000/api";

      // Check server status on page load
      async function checkServerStatus() {
        const statusDiv = document.getElementById("statusMsg");
        try {
          const response = await fetch(`${API_URL}/players`);
          if (response.ok) {
            statusDiv.innerHTML = "✅ Server online";
            statusDiv.className = "status online";
          } else {
            statusDiv.innerHTML = "⚠️ Server responded but with error";
            statusDiv.className = "status offline";
          }
        } catch (error) {
          statusDiv.innerHTML =
            "❌ Cannot connect to server. Make sure backend is running on port 5000";
          statusDiv.className = "status offline";
          console.error("Server connection error:", error);
        }
      }

      async function login() {
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;
        const errorDiv = document.getElementById("errorMsg");

        if (!username || !password) {
          errorDiv.innerHTML = "Please enter username and password";
          return;
        }

        errorDiv.innerHTML = "Logging in...";

        try {
          const response = await fetch(`${API_URL}/auth/login`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ username, password }),
          });

          const data = await response.json();

          if (response.ok) {
            localStorage.setItem("token", data.token);
            localStorage.setItem("user", JSON.stringify(data.user));
            errorDiv.innerHTML = "✅ Login successful! Redirecting...";
            setTimeout(() => {
              window.location.href = "advanced-dashboard.html";
            }, 1000);
          } else {
            errorDiv.innerHTML = "❌ " + (data.error || "Invalid credentials");
          }
        } catch (error) {
          console.error("Login error:", error);
          errorDiv.innerHTML =
            "❌ Cannot connect to server. Make sure backend is running on port 5000";
        }
      }

      // Check server status when page loads
      checkServerStatus();

      // Allow Enter key to submit
      document
        .getElementById("password")
        .addEventListener("keypress", function (e) {
          if (e.key === "Enter") {
            login();
          }
        });
    </script>
  </body>
</html>
