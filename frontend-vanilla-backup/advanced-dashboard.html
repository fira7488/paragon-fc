<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paragon FC - Advanced Control Center</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", sans-serif;
        background: linear-gradient(135deg, #0a0a0a 0%, #0f0f1a 100%);
        color: #fff;
        overflow-x: hidden;
      }
      .glass-nav {
        background: rgba(10, 10, 10, 0.8);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        position: fixed;
        width: 100%;
        top: 0;
        z-index: 1000;
        padding: 1rem 2rem;
      }
      .nav-container {
        max-width: 1400px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .logo {
        font-size: 1.8rem;
        font-weight: 800;
        background: linear-gradient(135deg, #fff 0%, #c9a227 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .logo span {
        background: linear-gradient(135deg, #c9a227 0%, #ffd700 100%);
        -webkit-background-clip: text;
      }
      .nav-links {
        display: flex;
        gap: 2rem;
        align-items: center;
      }
      .nav-link {
        color: rgba(255, 255, 255, 0.7);
        text-decoration: none;
        transition: all 0.3s;
        font-weight: 500;
        cursor: pointer;
      }
      .nav-link:hover,
      .nav-link.active {
        color: #c9a227;
      }
      .main-container {
        max-width: 1400px;
        margin: 80px auto 0;
        padding: 2rem;
      }
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 1.5rem;
        margin-bottom: 2rem;
      }
      .stat-card {
        background: linear-gradient(
          135deg,
          rgba(20, 20, 30, 0.9),
          rgba(15, 15, 25, 0.9)
        );
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 1.5rem;
        transition: all 0.4s;
        cursor: pointer;
        position: relative;
        overflow: hidden;
      }
      .stat-card:hover {
        transform: translateY(-5px);
        border-color: rgba(201, 162, 39, 0.5);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      }
      .stat-icon {
        font-size: 2.5rem;
        color: #c9a227;
        margin-bottom: 1rem;
      }
      .stat-value {
        font-size: 2.5rem;
        font-weight: 800;
        margin-bottom: 0.5rem;
      }
      .stat-label {
        color: rgba(255, 255, 255, 0.6);
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .stat-trend {
        position: absolute;
        top: 1rem;
        right: 1rem;
        font-size: 0.8rem;
        padding: 0.25rem 0.75rem;
        border-radius: 20px;
        background: rgba(0, 255, 0, 0.2);
        color: #00ff00;
      }
      .charts-section {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
        gap: 1.5rem;
        margin-bottom: 2rem;
      }
      .chart-card {
        background: rgba(20, 20, 30, 0.9);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 1.5rem;
      }
      .chart-title {
        font-size: 1.2rem;
        font-weight: 600;
        margin-bottom: 1rem;
        color: #c9a227;
      }
      canvas {
        max-height: 300px;
      }
      .players-section {
        background: rgba(20, 20, 30, 0.9);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 1.5rem;
        margin-bottom: 2rem;
      }
      .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
        gap: 1rem;
      }
      .search-box {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
      }
      .search-input {
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.2);
        padding: 0.5rem 1rem;
        border-radius: 10px;
        color: white;
        font-family: inherit;
      }
      .players-table {
        width: 100%;
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th {
        text-align: left;
        padding: 1rem;
        color: #c9a227;
        font-weight: 600;
        border-bottom: 2px solid rgba(255, 255, 255, 0.1);
      }
      td {
        padding: 1rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }
      .rating-badge {
        display: inline-block;
        padding: 0.25rem 0.75rem;
        border-radius: 20px;
        font-weight: 600;
        font-size: 0.85rem;
      }
      .rating-excellent {
        background: rgba(0, 255, 0, 0.2);
        color: #00ff00;
      }
      .rating-good {
        background: rgba(255, 255, 0, 0.2);
        color: #ffff00;
      }
      .rating-average {
        background: rgba(255, 165, 0, 0.2);
        color: #ffa500;
      }
      .rating-poor {
        background: rgba(255, 0, 0, 0.2);
        color: #ff4444;
      }
      .position-badge {
        display: inline-block;
        padding: 0.25rem 0.5rem;
        border-radius: 5px;
        font-size: 0.75rem;
        font-weight: 600;
      }
      .pos-GK {
        background: #3498db;
        color: white;
      }
      .pos-DEF {
        background: #2ecc71;
        color: white;
      }
      .pos-MID {
        background: #e74c3c;
        color: white;
      }
      .pos-FWD {
        background: #f39c12;
        color: white;
      }
      .notification-center {
        position: fixed;
        top: 80px;
        right: 20px;
        z-index: 1000;
        width: 300px;
      }
      .notification {
        background: linear-gradient(135deg, #1a1a2e, #16213e);
        border-left: 4px solid #c9a227;
        border-radius: 10px;
        padding: 1rem;
        margin-bottom: 0.5rem;
        animation: slideIn 0.3s ease-out;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
      }
      @keyframes slideIn {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }
      @media (max-width: 768px) {
        .main-container {
          padding: 1rem;
        }
        .charts-section {
          grid-template-columns: 1fr;
        }
        .stats-grid {
          grid-template-columns: 1fr;
        }
        .nav-links {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <nav class="glass-nav">
      <div class="nav-container">
        <div class="logo">PARAGON<span>FC</span></div>
        <div class="nav-links">
          <a class="nav-link active" data-page="dashboard">Dashboard</a>
          <a class="nav-link" data-page="players">Players</a>
          <a class="nav-link" data-page="matches">Matches</a>
          <button
            onclick="logout()"
            style="
              background: rgba(220, 38, 38, 0.2);
              border: 1px solid #dc2626;
              color: #dc2626;
              padding: 0.5rem 1rem;
              border-radius: 10px;
              cursor: pointer;
            "
          >
            <i class="fas fa-sign-out-alt"></i> Logout
          </button>
        </div>
      </div>
    </nav>

    <div class="notification-center" id="notificationCenter"></div>

    <div class="main-container" id="mainContainer">
      <div id="dashboardPage">
        <div class="stats-grid" id="statsGrid">
          <div class="stat-card">
            <i class="fas fa-spinner fa-spin"></i> Loading stats...
          </div>
        </div>
        <div class="charts-section">
          <div class="chart-card">
            <div class="chart-title">Performance Trends</div>
            <canvas id="performanceChart"></canvas>
          </div>
          <div class="chart-card">
            <div class="chart-title">Goal Distribution</div>
            <canvas id="goalsChart"></canvas>
          </div>
        </div>
        <div class="players-section">
          <div class="section-header">
            <h3><i class="fas fa-trophy"></i> Recent Match Results</h3>
          </div>
          <div id="recentMatches"></div>
        </div>
      </div>

      <div id="playersPage" style="display: none">
        <div class="players-section">
          <div class="section-header">
            <h3><i class="fas fa-users"></i> Squad Management</h3>
            <div class="search-box">
              <input
                type="text"
                class="search-input"
                id="playerSearch"
                placeholder="Search players..."
                onkeyup="searchPlayers()"
              />
              <select
                class="search-input"
                id="positionFilter"
                onchange="filterPlayers()"
              >
                <option value="all">All Positions</option>
                <option value="GK">Goalkeepers</option>
                <option value="DEF">Defenders</option>
                <option value="MID">Midfielders</option>
                <option value="FWD">Forwards</option>
              </select>
              <button
                class="search-input"
                onclick="showAddPlayerModal()"
                style="background: #c9a227; color: #000; cursor: pointer"
              >
                <i class="fas fa-plus"></i> Add Player
              </button>
            </div>
          </div>
          <div class="players-table" id="playersTable"></div>
        </div>
      </div>
    </div>

    <div
      id="addPlayerModal"
      style="
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.95);
        z-index: 2000;
        align-items: center;
        justify-content: center;
      "
    >
      <div
        style="
          background: #1a1a2e;
          border-radius: 20px;
          padding: 2rem;
          max-width: 500px;
          width: 90%;
          max-height: 80vh;
          overflow-y: auto;
        "
      >
        <h2 style="margin-bottom: 1rem">Add New Player</h2>
        <input
          type="text"
          id="newPlayerName"
          placeholder="Full Name"
          style="
            width: 100%;
            padding: 0.75rem;
            margin: 0.5rem 0;
            background: #0a0a0a;
            border: 1px solid #333;
            color: white;
            border-radius: 10px;
          "
        />
        <select
          id="newPlayerPosition"
          style="
            width: 100%;
            padding: 0.75rem;
            margin: 0.5rem 0;
            background: #0a0a0a;
            border: 1px solid #333;
            color: white;
            border-radius: 10px;
          "
        >
          <option value="GK">Goalkeeper</option>
          <option value="DEF">Defender</option>
          <option value="MID">Midfielder</option>
          <option value="FWD">Forward</option>
        </select>
        <input
          type="number"
          id="newPlayerNumber"
          placeholder="Jersey Number"
          style="
            width: 100%;
            padding: 0.75rem;
            margin: 0.5rem 0;
            background: #0a0a0a;
            border: 1px solid #333;
            color: white;
            border-radius: 10px;
          "
        />
        <input
          type="text"
          id="newPlayerHeight"
          placeholder="Height (e.g., 1.80m)"
          style="
            width: 100%;
            padding: 0.75rem;
            margin: 0.5rem 0;
            background: #0a0a0a;
            border: 1px solid #333;
            color: white;
            border-radius: 10px;
          "
        />
        <input
          type="text"
          id="newPlayerWeight"
          placeholder="Weight (e.g., 75kg)"
          style="
            width: 100%;
            padding: 0.75rem;
            margin: 0.5rem 0;
            background: #0a0a0a;
            border: 1px solid #333;
            color: white;
            border-radius: 10px;
          "
        />
        <div style="display: flex; gap: 1rem; margin-top: 1rem">
          <button
            onclick="addPlayer()"
            style="
              flex: 1;
              background: #c9a227;
              border: none;
              padding: 0.75rem;
              border-radius: 10px;
              cursor: pointer;
              font-weight: 600;
            "
          >
            Save Player
          </button>
          <button
            onclick="closeModal()"
            style="
              flex: 1;
              background: #333;
              border: none;
              padding: 0.75rem;
              border-radius: 10px;
              cursor: pointer;
            "
          >
            Cancel
          </button>
        </div>
      </div>
    </div>

    <script>
      // ============= CONFIGURATION =============
      const API_URL = "http://localhost:5000/api";
      let token = localStorage.getItem("token");
      let performanceChart, goalsChart;
      let playersData = [];

      // ============= AUTHENTICATION CHECK =============
      if (!token) {
        window.location.href = "admin.html";
      }

      // ============= TEST API CONNECTION =============
      async function testConnection() {
        try {
          const response = await fetch(`${API_URL}/players`);
          if (!response.ok) throw new Error("API not reachable");
          console.log("✅ API connected");
          showNotification("Connected to server", "success");
          return true;
        } catch (error) {
          console.error("❌ API connection failed:", error);
          document.getElementById("statsGrid").innerHTML = `
                    <div class="stat-card" style="grid-column: 1/-1; text-align: center;">
                        <div class="stat-icon"><i class="fas fa-exclamation-triangle"></i></div>
                        <div class="stat-value">Connection Error</div>
                        <div class="stat-label">Make sure backend is running on port 5000</div>
                        <button onclick="location.reload()" style="margin-top: 1rem; padding: 0.5rem 1rem; background: #c9a227; border: none; border-radius: 10px; cursor: pointer;">Retry</button>
                    </div>
                `;
          return false;
        }
      }
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("/sw.js")
          .then((reg) => console.log("SW registered", reg))
          .catch((err) => console.log("SW registration failed", err));
      }

      // ============= NAVIGATION =============
      function setupNavigation() {
        document.querySelectorAll(".nav-link").forEach((link) => {
          link.addEventListener("click", (e) => {
            e.preventDefault();
            const page = link.dataset.page;
            document
              .querySelectorAll(".nav-link")
              .forEach((l) => l.classList.remove("active"));
            link.classList.add("active");
            document.getElementById("dashboardPage").style.display =
              page === "dashboard" ? "block" : "none";
            document.getElementById("playersPage").style.display =
              page === "players" ? "block" : "none";
            if (page === "players") loadPlayers();
            if (page === "dashboard") loadDashboard();
          });
        });
      }

      // ============= DASHBOARD =============
      async function loadDashboard() {
        try {
          // Try to get analytics, fallback to basic stats
          let data;
          try {
            const response = await fetch(`${API_URL}/admin/analytics`, {
              headers: { Authorization: `Bearer ${token}` },
            });
            if (response.ok) {
              data = await response.json();
            } else {
              throw new Error("Analytics not available");
            }
          } catch (e) {
            // Fallback to basic stats
            const statsRes = await fetch(`${API_URL}/stats`);
            const stats = await statsRes.json();
            data = {
              overview: {
                totalPlayers: stats.players?.total || 0,
                activePlayers: stats.players?.total || 0,
                totalMatches: stats.matches?.total || 0,
                upcomingMatches: stats.matches?.upcoming || 0,
                winsLast5: 3,
                registrations: 0,
                pendingRegistrations: 0,
              },
            };
          }

          document.getElementById("statsGrid").innerHTML = `
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-users"></i></div><div class="stat-value">${data.overview?.totalPlayers || 0}</div><div class="stat-label">Total Players</div><div class="stat-trend"><i class="fas fa-arrow-up"></i> ${data.overview?.activePlayers || 0} active</div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-futbol"></i></div><div class="stat-value">${data.overview?.totalMatches || 0}</div><div class="stat-label">Matches Played</div><div class="stat-trend"><i class="fas fa-calendar"></i> ${data.overview?.upcomingMatches || 0} upcoming</div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-chart-line"></i></div><div class="stat-value">${data.overview?.winsLast5 || 0}/5</div><div class="stat-label">Last 5 Games</div><div class="stat-trend">Form: ${"W".repeat(data.overview?.winsLast5 || 0)}${"L".repeat(5 - (data.overview?.winsLast5 || 0))}</div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-user-plus"></i></div><div class="stat-value">${data.overview?.registrations || 0}</div><div class="stat-label">Total Registrations</div><div class="stat-trend">${data.overview?.pendingRegistrations || 0} pending</div></div>
                `;
          updateCharts();
          loadRecentMatches();
        } catch (error) {
          console.error("Error loading dashboard:", error);
          showNotification("Error loading dashboard data", "error");
        }
      }

      function updateCharts() {
        const ctx1 = document
          .getElementById("performanceChart")
          ?.getContext("2d");
        const ctx2 = document.getElementById("goalsChart")?.getContext("2d");
        if (!ctx1 || !ctx2) return;

        if (performanceChart) performanceChart.destroy();
        if (goalsChart) goalsChart.destroy();

        performanceChart = new Chart(ctx1, {
          type: "line",
          data: {
            labels: [
              "Week 1",
              "Week 2",
              "Week 3",
              "Week 4",
              "Week 5",
              "Week 6",
            ],
            datasets: [
              {
                label: "Goals Scored",
                data: [12, 8, 15, 10, 7, 14],
                borderColor: "#c9a227",
                backgroundColor: "rgba(201,162,39,0.1)",
                tension: 0.4,
                fill: true,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: { legend: { labels: { color: "#fff" } } },
          },
        });

        goalsChart = new Chart(ctx2, {
          type: "doughnut",
          data: {
            labels: ["Marcus Webb", "Omar Salah", "Others"],
            datasets: [
              {
                data: [28, 16, 11],
                backgroundColor: ["#c9a227", "#e74c3c", "#3498db"],
                borderWidth: 0,
              },
            ],
          },
          options: {
            responsive: true,
            plugins: {
              legend: { labels: { color: "#fff", position: "bottom" } },
            },
          },
        });
      }

      async function loadRecentMatches() {
        try {
          const response = await fetch(
            `${API_URL}/matches?status=past&limit=5`,
          );
          if (!response.ok) throw new Error("No matches data");
          const matches = await response.json();
          if (!matches.length) {
            document.getElementById("recentMatches").innerHTML =
              '<p style="text-align: center; padding: 2rem;">No match data available</p>';
            return;
          }
          document.getElementById("recentMatches").innerHTML = `
                    <table><thead><tr><th>Opponent</th><th>Date</th><th>Result</th><th>Score</th><th>Competition</th></tr></thead>
                    <tbody>${matches.map((m) => `<tr><td>${m.opponent}</td><td>${new Date(m.date).toLocaleDateString()}</td><td><span class="rating-badge rating-${m.result === "W" ? "excellent" : m.result === "D" ? "good" : "poor"}">${m.result}</span></td><td>${m.score?.home || 0} - ${m.score?.away || 0}</td><td>${m.competition || "League"}</td></tr>`).join("")}</tbody></table>
                `;
        } catch (error) {
          console.error("Error loading matches:", error);
          document.getElementById("recentMatches").innerHTML =
            '<p style="text-align: center; padding: 2rem;">No match data available</p>';
        }
      }

      // ============= PLAYERS MANAGEMENT =============
      async function loadPlayers() {
        try {
          const response = await fetch(`${API_URL}/players`);
          playersData = await response.json();
          displayPlayers(playersData);
        } catch (error) {
          console.error("Error loading players:", error);
          showNotification("Error loading players", "error");
        }
      }

      function displayPlayers(players) {
        const getRatingClass = (rating) => {
          if (rating >= 7.5) return "rating-excellent";
          if (rating >= 6.5) return "rating-good";
          if (rating >= 5.5) return "rating-average";
          return "rating-poor";
        };
        document.getElementById("playersTable").innerHTML = `
                <table><thead><tr><th>#</th><th>Name</th><th>Pos</th><th>Goals</th><th>Assists</th><th>Apps</th><th>Rating</th><th>Actions</th></tr></thead>
                <tbody>${players
                  .map(
                    (p) => `
                    <tr>
                        <td><strong>${p.number}</strong></td>
                        <td><strong>${p.name}</strong></td>
                        <td><span class="position-badge pos-${p.position}">${p.position}</span></td>
                        <td>${p.goals || 0}</td><td>${p.assists || 0}</td><td>${p.appearances || 0}</td>
                        <td><span class="rating-badge ${getRatingClass(p.averageRating || 6.5)}">${(p.averageRating || 6.5).toFixed(1)}</span></td>
                        <td><button onclick="deletePlayer('${p._id}')" style="background: none; border: none; color: #dc2626; cursor: pointer;"><i class="fas fa-trash"></i></button></td>
                    </tr>`,
                  )
                  .join("")}</tbody></table>
            `;
      }

      function searchPlayers() {
        const searchTerm =
          document.getElementById("playerSearch")?.value.toLowerCase() || "";
        const filtered = playersData.filter((p) =>
          p.name.toLowerCase().includes(searchTerm),
        );
        displayPlayers(filtered);
      }

      function filterPlayers() {
        const position =
          document.getElementById("positionFilter")?.value || "all";
        const filtered =
          position === "all"
            ? playersData
            : playersData.filter((p) => p.position === position);
        displayPlayers(filtered);
      }

      async function addPlayer() {
        const player = {
          name: document.getElementById("newPlayerName").value,
          position: document.getElementById("newPlayerPosition").value,
          number: parseInt(document.getElementById("newPlayerNumber").value),
          height: document.getElementById("newPlayerHeight").value,
          weight: document.getElementById("newPlayerWeight").value,
          goals: 0,
          assists: 0,
          appearances: 0,
          averageRating: 6.5,
          pace: 70,
          shooting: 70,
          defense: 70,
          stamina: 70,
        };
        try {
          const response = await fetch(`${API_URL}/players`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify(player),
          });
          if (response.ok) {
            showNotification("Player added successfully!", "success");
            closeModal();
            loadPlayers();
          } else {
            const error = await response.json();
            showNotification("Error: " + error.error, "error");
          }
        } catch (error) {
          showNotification("Error adding player", "error");
        }
      }

      async function deletePlayer(id) {
        if (confirm("Are you sure you want to delete this player?")) {
          try {
            await fetch(`${API_URL}/players/${id}`, {
              method: "DELETE",
              headers: { Authorization: `Bearer ${token}` },
            });
            showNotification("Player deleted successfully", "success");
            loadPlayers();
          } catch (error) {
            showNotification("Error deleting player", "error");
          }
        }
      }

      // ============= UI HELPERS =============
      function showAddPlayerModal() {
        document.getElementById("addPlayerModal").style.display = "flex";
      }
      function closeModal() {
        document.getElementById("addPlayerModal").style.display = "none";
        [
          "newPlayerName",
          "newPlayerNumber",
          "newPlayerHeight",
          "newPlayerWeight",
        ].forEach((id) => {
          const el = document.getElementById(id);
          if (el) el.value = "";
        });
      }

      function showNotification(message, type) {
        const container = document.getElementById("notificationCenter");
        const notification = document.createElement("div");
        notification.className = "notification";
        notification.innerHTML = `<i class="fas ${type === "success" ? "fa-check-circle" : type === "error" ? "fa-exclamation-circle" : "fa-info-circle"}" style="margin-right: 10px; color: ${type === "success" ? "#00ff00" : type === "error" ? "#ff4444" : "#c9a227"}"></i>${message}`;
        container.appendChild(notification);
        setTimeout(() => notification.remove(), 5000);
      }

      function connectWebSocket() {
        try {
          const socket = io("http://localhost:5000", {
            transports: ["websocket"],
            timeout: 10000,
          });
          socket.on("connect", () => {
            console.log("WebSocket connected");
            showNotification("Real-time updates active", "success");
          });
          socket.on("matchUpdate", (data) => {
            showNotification(`Match update: ${data.message}`, "info");
            loadDashboard();
          });
          socket.on("playerUpdate", (data) => {
            showNotification(`Player update: ${data.message}`, "info");
            loadPlayers();
          });
          socket.on("connect_error", (err) => {
            console.log("WebSocket connection error:", err.message);
          });
        } catch (e) {
          console.log("WebSocket not available");
        }
      }

      function startRealTimeUpdates() {
        setInterval(() => {
          if (document.getElementById("dashboardPage").style.display !== "none")
            loadDashboard();
        }, 30000);
      }

      function logout() {
        localStorage.removeItem("token");
        window.location.href = "admin.html";
      }

      // ============= INITIALIZATION =============
      document.addEventListener("DOMContentLoaded", async () => {
        const connected = await testConnection();
        if (connected) {
          loadDashboard();
          loadPlayers();
          setupNavigation();
          connectWebSocket();
          startRealTimeUpdates();
        }
      });

      // Admin-only protection
      token = localStorage.getItem("token");
      if (!token) {
        // Not logged in - redirect to login page
        window.location.href = "admin.html";
      }

      // Check if user has admin role
      try {
        const user = JSON.parse(localStorage.getItem("user") || "{}");
        if (user.role !== "super_admin" && user.role !== "admin") {
          // Not an admin - redirect to home
          window.location.href = "index-ultimate.html";
        }
      } catch (e) {
        window.location.href = "admin.html";
      }
    </script>
  </body>
</html>
