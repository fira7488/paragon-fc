<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paragon FC – Advanced Admin Console</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: #0a0a0a;
        color: #fff;
      }

      .admin-wrapper {
        display: flex;
        min-height: 100vh;
      }

      /* Sidebar */
      .sidebar {
        width: 280px;
        background: #111;
        border-right: 1px solid #222;
        position: fixed;
        height: 100vh;
        overflow-y: auto;
        transition: all 0.3s;
      }

      .sidebar-header {
        padding: 24px;
        border-bottom: 1px solid #222;
      }

      .sidebar-header h2 {
        font-size: 24px;
        background: linear-gradient(135deg, #fff, #c9a227);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .sidebar-nav {
        padding: 20px;
      }

      .nav-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        margin: 4px 0;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.2s;
        color: rgba(255, 255, 255, 0.7);
      }

      .nav-item i {
        width: 24px;
      }

      .nav-item:hover,
      .nav-item.active {
        background: #c9a227;
        color: #000;
      }

      /* Main Content */
      .main-content {
        flex: 1;
        margin-left: 280px;
        padding: 24px 32px;
      }

      /* Cards */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 20px;
        margin-bottom: 32px;
      }

      .stat-card {
        background: #111;
        border: 1px solid #222;
        border-radius: 20px;
        padding: 20px;
        transition: transform 0.2s;
      }

      .stat-card:hover {
        transform: translateY(-4px);
        border-color: #c9a227;
      }

      .stat-title {
        font-size: 14px;
        color: #aaa;
        margin-bottom: 8px;
      }

      .stat-number {
        font-size: 32px;
        font-weight: 800;
        color: #c9a227;
      }

      /* Tables */
      .data-table {
        width: 100%;
        background: #111;
        border-radius: 16px;
        overflow-x: auto;
        margin-top: 16px;
      }

      .data-table th,
      .data-table td {
        padding: 12px 16px;
        text-align: left;
        border-bottom: 1px solid #222;
      }

      .data-table th {
        color: #c9a227;
        font-weight: 600;
      }

      .action-btn {
        background: none;
        border: none;
        cursor: pointer;
        margin: 0 4px;
        font-size: 16px;
      }

      .edit-btn {
        color: #3498db;
      }
      .delete-btn {
        color: #e74c3c;
      }
      .approve-btn {
        color: #2ecc71;
      }

      /* Forms */
      .form-card {
        background: #111;
        border: 1px solid #222;
        border-radius: 20px;
        padding: 24px;
        margin-bottom: 24px;
      }

      .form-group {
        margin-bottom: 16px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
      }

      .form-group input,
      .form-group select,
      .form-group textarea {
        width: 100%;
        padding: 10px 12px;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 8px;
        color: #fff;
      }

      .btn-primary {
        background: #c9a227;
        color: #000;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
      }

      .btn-primary:hover {
        background: #d4b33a;
      }

      .btn-danger {
        background: #e74c3c;
        color: #fff;
      }

      /* Modal */
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }

      .modal.active {
        display: flex;
      }

      .modal-content {
        background: #1a1a2e;
        border-radius: 20px;
        padding: 24px;
        max-width: 500px;
        width: 90%;
      }

      /* Responsive */
      @media (max-width: 768px) {
        .sidebar {
          transform: translateX(-100%);
          position: fixed;
          z-index: 100;
        }
        .sidebar.open {
          transform: translateX(0);
        }
        .main-content {
          margin-left: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="admin-wrapper">
      <!-- Sidebar -->
      <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <h2>PARAGON<span style="color: #c9a227">FC</span></h2>
          <p style="font-size: 12px; color: #aaa">Admin Console</p>
        </div>
        <div class="sidebar-nav">
          <div class="nav-item active" data-section="dashboard">
            <i class="fas fa-tachometer-alt"></i> Dashboard
          </div>
          <div class="nav-item" data-section="players">
            <i class="fas fa-users"></i> Players
          </div>
          <div class="nav-item" data-section="gallery">
            <i class="fas fa-images"></i> Gallery
          </div>
          <div class="nav-item" data-section="matches">
            <i class="fas fa-futbol"></i> Matches
          </div>
          <div class="nav-item" data-section="standings">
            <i class="fas fa-table"></i> Standings
          </div>
          <div class="nav-item" data-section="registrations">
            <i class="fas fa-clipboard-list"></i> Registrations
          </div>
          <div class="nav-item" id="logoutBtn">
            <i class="fas fa-sign-out-alt"></i> Logout
          </div>
        </div>
      </div>

      <!-- Main Content -->
      <div class="main-content">
        <!-- Dashboard Section -->
        <div id="dashboardSection">
          <h1>Dashboard</h1>
          <div class="stats-grid" id="statsGrid"></div>
          <div class="form-card">
            <h3>Performance Trends</h3>
            <canvas id="performanceChart" height="100"></canvas>
          </div>
        </div>

        <!-- Players Section -->
        <div id="playersSection" style="display: none">
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-bottom: 20px;
            "
          >
            <h1>Player Management</h1>
            <button class="btn-primary" id="addPlayerBtn">+ Add Player</button>
          </div>
          <div class="data-table" id="playersTable"></div>
        </div>

        <!-- Gallery Section -->
        <div id="gallerySection" style="display: none">
          <h1>Gallery Moderation</h1>
          <div class="data-table" id="galleryTable"></div>
        </div>

        <!-- Matches Section -->
        <div id="matchesSection" style="display: none">
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-bottom: 20px;
            "
          >
            <h1>Match Management</h1>
            <button class="btn-primary" id="addMatchBtn">+ Add Match</button>
          </div>
          <div class="data-table" id="matchesTable"></div>
        </div>

        <!-- Standings Section -->
        <div id="standingsSection" style="display: none">
          <h1>Edit Standings</h1>
          <div class="data-table" id="standingsTable"></div>
        </div>

        <!-- Registrations Section -->
        <div id="registrationsSection" style="display: none">
          <h1>Player Registrations</h1>
          <div class="data-table" id="registrationsTable"></div>
        </div>
      </div>
    </div>

    <!-- Add/Edit Player Modal -->
    <div id="playerModal" class="modal">
      <div class="modal-content">
        <h3 id="playerModalTitle">Add Player</h3>
        <input type="hidden" id="playerId" />
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="playerName" placeholder="Full name" />
        </div>
        <div class="form-group">
          <label>Position</label>
          <select id="playerPosition">
            <option value="GK">GK</option>
            <option value="DEF">DEF</option>
            <option value="MID">MID</option>
            <option value="FWD">FWD</option>
          </select>
        </div>
        <div class="form-group">
          <label>Number</label>
          <input type="number" id="playerNumber" placeholder="Jersey number" />
        </div>
        <div class="form-group">
          <label>Height</label>
          <input type="text" id="playerHeight" placeholder="e.g., 1.80m" />
        </div>
        <div class="form-group">
          <label>Weight</label>
          <input type="text" id="playerWeight" placeholder="e.g., 75kg" />
        </div>
        <button class="btn-primary" onclick="savePlayer()">Save</button>
        <button
          class="btn-primary"
          style="background: #333"
          onclick="closeModal('playerModal')"
        >
          Cancel
        </button>
      </div>
    </div>

    <!-- Add Match Modal -->
    <div id="matchModal" class="modal">
      <div class="modal-content">
        <h3>Add Match</h3>
        <input type="hidden" id="matchId" />
        <div class="form-group">
          <label>Opponent</label>
          <input type="text" id="matchOpponent" placeholder="Opponent name" />
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="datetime-local" id="matchDate" />
        </div>
        <div class="form-group">
          <label>Venue</label>
          <select id="matchVenue">
            <option value="Home">Home</option>
            <option value="Away">Away</option>
          </select>
        </div>
        <div class="form-group">
          <label>Competition</label>
          <input type="text" id="matchCompetition" placeholder="League / Cup" />
        </div>
        <div class="form-group">
          <label>Result</label>
          <select id="matchResult">
            <option value="UPCOMING">Upcoming</option>
            <option value="W">Win</option>
            <option value="D">Draw</option>
            <option value="L">Loss</option>
          </select>
        </div>
        <div class="form-group" id="scoreGroup" style="display: none">
          <label>Score (Home - Away)</label>
          <div style="display: flex; gap: 10px">
            <input
              type="number"
              id="matchHomeScore"
              placeholder="Home"
              style="width: 50%"
            />
            <input
              type="number"
              id="matchAwayScore"
              placeholder="Away"
              style="width: 50%"
            />
          </div>
        </div>
        <button class="btn-primary" onclick="saveMatch()">Save</button>
        <button
          class="btn-primary"
          style="background: #333"
          onclick="closeModal('matchModal')"
        >
          Cancel
        </button>
      </div>
    </div>

    <script>
      const API_URL = "http://localhost:5000/api";
      let token = localStorage.getItem("token");
      let performanceChart;

      // ---------- Auth Check ----------
      if (!token) {
        window.location.href = "admin.html";
      }

      // ---------- Navigation ----------
      document.querySelectorAll(".nav-item[data-section]").forEach((item) => {
        item.addEventListener("click", () => {
          const section = item.dataset.section;
          // Hide all sections
          document
            .querySelectorAll(
              "#dashboardSection, #playersSection, #gallerySection, #matchesSection, #standingsSection, #registrationsSection",
            )
            .forEach((sec) => (sec.style.display = "none"));
          document.getElementById(`${section}Section`).style.display = "block";
          // Update active class
          document
            .querySelectorAll(".nav-item")
            .forEach((nav) => nav.classList.remove("active"));
          item.classList.add("active");
          // Load data for section
          if (section === "dashboard") loadDashboard();
          if (section === "players") loadPlayers();
          if (section === "gallery") loadGalleryAdmin();
          if (section === "matches") loadMatches();
          if (section === "standings") loadStandingsAdmin();
          if (section === "registrations") loadRegistrations();
        });
      });

      // Logout
      document.getElementById("logoutBtn").addEventListener("click", () => {
        localStorage.removeItem("token");
        localStorage.removeItem("user");
        window.location.href = "admin.html";
      });

      // ---------- Dashboard ----------
      async function loadDashboard() {
        try {
          const res = await fetch(`${API_URL}/stats`);
          const data = await res.json();
          document.getElementById("statsGrid").innerHTML = `
        <div class="stat-card"><div class="stat-title">Total Players</div><div class="stat-number">${data.players?.total || 0}</div></div>
        <div class="stat-card"><div class="stat-title">Matches</div><div class="stat-number">${data.matches?.total || 0}</div></div>
        <div class="stat-card"><div class="stat-title">Upcoming</div><div class="stat-number">${data.matches?.upcoming || 0}</div></div>
        <div class="stat-card"><div class="stat-title">Top Scorer Goals</div><div class="stat-number">${data.players?.topScorer?.goals || 0}</div></div>
      `;
          // Simple chart
          if (performanceChart) performanceChart.destroy();
          const ctx = document
            .getElementById("performanceChart")
            .getContext("2d");
          performanceChart = new Chart(ctx, {
            type: "line",
            data: {
              labels: ["Jan", "Feb", "Mar", "Apr", "May", "Jun"],
              datasets: [
                {
                  label: "Goals",
                  data: [12, 19, 15, 17, 22, 28],
                  borderColor: "#c9a227",
                  tension: 0.4,
                },
              ],
            },
            options: { responsive: true },
          });
        } catch (e) {
          console.error(e);
        }
      }

      // ---------- Players ----------
      async function loadPlayers() {
        const res = await fetch(`${API_URL}/players`);
        const players = await res.json();
        const html = `
      <table class="data-table">
        <thead><tr><th>#</th><th>Name</th><th>Pos</th><th>Goals</th><th>Assists</th><th>Apps</th><th>Actions</th></tr></thead>
        <tbody>
          ${players
            .map(
              (p) => `
            <tr>
              <td>${p.number}</td>
              <td>${p.name}</td>
              <td>${p.position}</td>
              <td>${p.goals || 0}</td>
              <td>${p.assists || 0}</td>
              <td>${p.appearances || 0}</td>
              <td>
                <button class="action-btn edit-btn" onclick="editPlayer('${p._id}')"><i class="fas fa-edit"></i></button>
                <button class="action-btn delete-btn" onclick="deletePlayer('${p._id}')"><i class="fas fa-trash"></i></button>
              </td>
            </tr>
          `,
            )
            .join("")}
        </tbody>
      </table>
    `;
        document.getElementById("playersTable").innerHTML = html;
      }

      window.editPlayer = async (id) => {
        const res = await fetch(`${API_URL}/players/${id}`);
        const player = await res.json();
        document.getElementById("playerId").value = player._id;
        document.getElementById("playerName").value = player.name;
        document.getElementById("playerPosition").value = player.position;
        document.getElementById("playerNumber").value = player.number;
        document.getElementById("playerHeight").value = player.height || "";
        document.getElementById("playerWeight").value = player.weight || "";
        document.getElementById("playerModalTitle").innerText = "Edit Player";
        document.getElementById("playerModal").classList.add("active");
      };

      window.savePlayer = async () => {
        const id = document.getElementById("playerId").value;
        const playerData = {
          name: document.getElementById("playerName").value,
          position: document.getElementById("playerPosition").value,
          number: parseInt(document.getElementById("playerNumber").value),
          height: document.getElementById("playerHeight").value,
          weight: document.getElementById("playerWeight").value,
        };
        const method = id ? "PUT" : "POST";
        const url = id ? `${API_URL}/players/${id}` : `${API_URL}/players`;
        await fetch(url, {
          method,
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify(playerData),
        });
        closeModal("playerModal");
        loadPlayers();
      };

      window.deletePlayer = async (id) => {
        if (confirm("Delete this player?")) {
          await fetch(`${API_URL}/players/${id}`, {
            method: "DELETE",
            headers: { Authorization: `Bearer ${token}` },
          });
          loadPlayers();
        }
      };

      document.getElementById("addPlayerBtn").addEventListener("click", () => {
        document.getElementById("playerId").value = "";
        document.getElementById("playerName").value = "";
        document.getElementById("playerPosition").value = "FWD";
        document.getElementById("playerNumber").value = "";
        document.getElementById("playerHeight").value = "";
        document.getElementById("playerWeight").value = "";
        document.getElementById("playerModalTitle").innerText = "Add Player";
        document.getElementById("playerModal").classList.add("active");
      });

      // ---------- Gallery Admin ----------
      async function loadGalleryAdmin() {
        const res = await fetch(`${API_URL}/admin/gallery`, {
          headers: { Authorization: `Bearer ${token}` },
        });
        const images = await res.json();
        const html = `
      <table class="data-table">
        <thead><tr><th>Image</th><th>Title</th><th>Uploaded By</th><th>Likes</th><th>Actions</th></tr></thead>
        <tbody>
          ${images
            .map(
              (img) => `
            <tr>
              <td><img src="http://localhost:5000${img.imageUrl}" width="50" height="50" style="object-fit:cover;"></td>
              <td>${img.title}</td>
              <td>${img.uploadedBy || "Fan"}</td>
              <td>${img.likes}</td>
              <td>
                <button class="action-btn delete-btn" onclick="deleteGalleryImage('${img._id}')"><i class="fas fa-trash"></i></button>
              </td>
            </tr>
          `,
            )
            .join("")}
        </tbody>
      </table>
    `;
        document.getElementById("galleryTable").innerHTML = html;
      }

      window.deleteGalleryImage = async (id) => {
        if (confirm("Delete this image?")) {
          await fetch(`${API_URL}/gallery/${id}`, {
            method: "DELETE",
            headers: { Authorization: `Bearer ${token}` },
          });
          loadGalleryAdmin();
        }
      };

      // ---------- Matches ----------
      async function loadMatches() {
        const res = await fetch(`${API_URL}/matches`);
        const matches = await res.json();
        const html = `
      <table class="data-table">
        <thead><tr><th>Opponent</th><th>Date</th><th>Venue</th><th>Result</th><th>Score</th><th>Actions</th></tr></thead>
        <tbody>
          ${matches
            .map(
              (m) => `
            <tr>
              <td>${m.opponent}</td>
              <td>${new Date(m.date).toLocaleDateString()}</td>
              <td>${m.venue}</td>
              <td>${m.result}</td>
              <td>${m.score?.home ?? "-"} - ${m.score?.away ?? "-"}</td>
              <td>
                <button class="action-btn edit-btn" onclick="editMatch('${m._id}')"><i class="fas fa-edit"></i></button>
                <button class="action-btn delete-btn" onclick="deleteMatch('${m._id}')"><i class="fas fa-trash"></i></button>
              </td>
            </tr>
          `,
            )
            .join("")}
        </tbody>
      </table>
    `;
        document.getElementById("matchesTable").innerHTML = html;
      }

      window.editMatch = async (id) => {
        const res = await fetch(`${API_URL}/matches/${id}`);
        const match = await res.json();
        document.getElementById("matchId").value = match._id;
        document.getElementById("matchOpponent").value = match.opponent;
        document.getElementById("matchDate").value = match.date.slice(0, 16);
        document.getElementById("matchVenue").value = match.venue;
        document.getElementById("matchCompetition").value =
          match.competition || "";
        document.getElementById("matchResult").value = match.result;
        const scoreGroup = document.getElementById("scoreGroup");
        if (match.result !== "UPCOMING") {
          scoreGroup.style.display = "block";
          document.getElementById("matchHomeScore").value =
            match.score?.home || 0;
          document.getElementById("matchAwayScore").value =
            match.score?.away || 0;
        } else {
          scoreGroup.style.display = "none";
        }
        document.getElementById("matchModal").classList.add("active");
      };

      window.saveMatch = async () => {
        const id = document.getElementById("matchId").value;
        const matchData = {
          opponent: document.getElementById("matchOpponent").value,
          date: document.getElementById("matchDate").value,
          venue: document.getElementById("matchVenue").value,
          competition: document.getElementById("matchCompetition").value,
          result: document.getElementById("matchResult").value,
        };
        if (matchData.result !== "UPCOMING") {
          matchData.score = {
            home:
              parseInt(document.getElementById("matchHomeScore").value) || 0,
            away:
              parseInt(document.getElementById("matchAwayScore").value) || 0,
          };
        }
        const method = id ? "PUT" : "POST";
        const url = id ? `${API_URL}/matches/${id}` : `${API_URL}/matches`;
        await fetch(url, {
          method,
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify(matchData),
        });
        closeModal("matchModal");
        loadMatches();
      };

      window.deleteMatch = async (id) => {
        if (confirm("Delete this match?")) {
          await fetch(`${API_URL}/matches/${id}`, {
            method: "DELETE",
            headers: { Authorization: `Bearer ${token}` },
          });
          loadMatches();
        }
      };

      document.getElementById("addMatchBtn").addEventListener("click", () => {
        document.getElementById("matchId").value = "";
        document.getElementById("matchOpponent").value = "";
        document.getElementById("matchDate").value = "";
        document.getElementById("matchVenue").value = "Home";
        document.getElementById("matchCompetition").value = "League";
        document.getElementById("matchResult").value = "UPCOMING";
        document.getElementById("scoreGroup").style.display = "none";
        document.getElementById("matchModal").classList.add("active");
      });

      // Show/hide score inputs based on result selection
      document.getElementById("matchResult").addEventListener("change", (e) => {
        const scoreGroup = document.getElementById("scoreGroup");
        if (e.target.value !== "UPCOMING") {
          scoreGroup.style.display = "block";
        } else {
          scoreGroup.style.display = "none";
        }
      });

      // ---------- Standings Admin ----------
      async function loadStandingsAdmin() {
        const res = await fetch(`${API_URL}/standings`);
        let standings = await res.json();
        if (!Array.isArray(standings)) standings = standings.data || [];
        const html = `
      <table class="data-table">
        <thead><tr><th>Team</th><th>Played</th><th>Wins</th><th>Draws</th><th>Losses</th><th>GF</th><th>GA</th><th>Points</th><th>Actions</th></tr></thead>
        <tbody>
          ${standings
            .map(
              (team) => `
            <tr>
              <td><strong>${team.teamName}</strong></td>
              <td><input type="number" id="played_${team._id}" value="${team.played}" style="width:60px;"></td>
              <td><input type="number" id="wins_${team._id}" value="${team.wins}" style="width:60px;"></td>
              <td><input type="number" id="draws_${team._id}" value="${team.draws}" style="width:60px;"></td>
              <td><input type="number" id="losses_${team._id}" value="${team.losses}" style="width:60px;"></td>
              <td><input type="number" id="gf_${team._id}" value="${team.goalsFor}" style="width:60px;"></td>
              <td><input type="number" id="ga_${team._id}" value="${team.goalsAgainst}" style="width:60px;"></td>
              <td><input type="number" id="pts_${team._id}" value="${team.points}" style="width:60px;"></td>
              <td><button class="action-btn edit-btn" onclick="updateStanding('${team._id}')">Save</button></td>
            </tr>
          `,
            )
            .join("")}
        </tbody>
      </table>
    `;
        document.getElementById("standingsTable").innerHTML = html;
      }

      window.updateStanding = async (id) => {
        const data = {
          played: parseInt(document.getElementById(`played_${id}`).value),
          wins: parseInt(document.getElementById(`wins_${id}`).value),
          draws: parseInt(document.getElementById(`draws_${id}`).value),
          losses: parseInt(document.getElementById(`losses_${id}`).value),
          goalsFor: parseInt(document.getElementById(`gf_${id}`).value),
          goalsAgainst: parseInt(document.getElementById(`ga_${id}`).value),
          points: parseInt(document.getElementById(`pts_${id}`).value),
          goalDifference:
            parseInt(document.getElementById(`gf_${id}`).value) -
            parseInt(document.getElementById(`ga_${id}`).value),
        };
        await fetch(`${API_URL}/standings/${id}`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify(data),
        });
        alert("Standing updated!");
        loadStandingsAdmin();
      };

      // ---------- Registrations ----------
      async function loadRegistrations() {
        const res = await fetch(`${API_URL}/registrations`, {
          headers: { Authorization: `Bearer ${token}` },
        });
        const regs = await res.json();
        const html = `
      <table class="data-table">
        <thead><tr><th>Name</th><th>Student ID</th><th>Position</th><th>Email</th><th>Status</th><th>Action</th></tr></thead>
        <tbody>
          ${regs
            .map(
              (r) => `
            <tr>
              <td>${r.firstName} ${r.lastName}</td>
              <td>${r.studentId}</td>
              <td>${r.preferredPosition || "N/A"}</td>
              <td>${r.email}</td>
              <td>
                <select onchange="updateRegistrationStatus('${r._id}', this.value)">
                  <option value="Pending" ${r.status === "Pending" ? "selected" : ""}>Pending</option>
                  <option value="Contacted" ${r.status === "Contacted" ? "selected" : ""}>Contacted</option>
                  <option value="Trial Scheduled" ${r.status === "Trial Scheduled" ? "selected" : ""}>Trial Scheduled</option>
                  <option value="Accepted" ${r.status === "Accepted" ? "selected" : ""}>Accepted</option>
                  <option value="Rejected" ${r.status === "Rejected" ? "selected" : ""}>Rejected</option>
                </select>
              </td>
              <td><button class="action-btn delete-btn" onclick="deleteRegistration('${r._id}')"><i class="fas fa-trash"></i></button></td>
            </tr>
          `,
            )
            .join("")}
        </tbody>
      </table>
    `;
        document.getElementById("registrationsTable").innerHTML = html;
      }

      window.updateRegistrationStatus = async (id, status) => {
        await fetch(`${API_URL}/registrations/${id}/status`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify({ status }),
        });
        loadRegistrations();
      };

      window.deleteRegistration = async (id) => {
        if (confirm("Delete this registration?")) {
          await fetch(`${API_URL}/registrations/${id}`, {
            method: "DELETE",
            headers: { Authorization: `Bearer ${token}` },
          });
          loadRegistrations();
        }
      };

      // ---------- Modal helpers ----------
      window.closeModal = (modalId) => {
        document.getElementById(modalId).classList.remove("active");
      };

      // Initial load
      loadDashboard();
    </script>
  </body>
</html>
